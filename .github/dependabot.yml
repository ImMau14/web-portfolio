version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(deps):"
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(ci):"
    groups:
      all-actions:
        patterns:
          - "*"
